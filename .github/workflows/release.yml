name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -o dist/azure-instance-selector_linux_amd64   ./cmd
          GOOS=linux   GOARCH=arm64 go build -o dist/azure-instance-selector_linux_arm64   ./cmd
          GOOS=windows GOARCH=amd64 go build -o dist/azure-instance-selector_windows_amd64.exe ./cmd
          GOOS=windows GOARCH=arm64 go build -o dist/azure-instance-selector_windows_arm64.exe ./cmd
          GOOS=darwin  GOARCH=amd64 go build -o dist/azure-instance-selector_darwin_amd64  ./cmd
          GOOS=darwin  GOARCH=arm64 go build -o dist/azure-instance-selector_darwin_arm64  ./cmd

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
